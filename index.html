<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚾ 풀베이스 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f0f4f8;
    color: #1a2a3a;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  /* 히어로 */
  .hero {
    text-align: center;
    padding: 36px 20px 32px;
    margin-bottom: 36px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 20px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: linear-gradient(90deg, #2563eb, #f59e0b);
  }

  .hero-icon {
    font-size: 48px;
    margin-bottom: 8px;
  }

  .hero h1 {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    color: #1a2a3a;
    margin-bottom: 4px;
  }

  .hero .tagline {
    font-size: 16px;
    color: #6b7b8d;
    font-weight: 500;
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .hero .season-badge {
    display: inline-block;
    margin-top: 20px;
    padding: 6px 20px;
    font-size: 13px;
    font-weight: 700;
    color: #2563eb;
    background: rgba(37, 99, 235, 0.08);
    border: 1px solid rgba(37, 99, 235, 0.2);
    border-radius: 20px;
    letter-spacing: 2px;
  }

  /* 퀵 스탯 */
  .quick-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 48px;
  }

  .quick-stat {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 20px;
    text-align: center;
  }

  .quick-stat-icon {
    font-size: 28px;
    margin-bottom: 8px;
  }

  .quick-stat-number {
    font-size: 26px;
    font-weight: 900;
    color: #1a2a3a;
  }

  .quick-stat-label {
    font-size: 11px;
    color: #6b7b8d;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* 네비게이션 카드 */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }

  .nav-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 36px 24px;
    text-align: center;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .nav-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    transition: height 0.3s ease;
  }

  .nav-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
    border-color: #cbd5e1;
  }

  .nav-card:hover::before {
    height: 6px;
  }

  .nav-card.schedule::before { background: linear-gradient(90deg, #2563eb, #3b82f6); }
  .nav-card.roster::before { background: linear-gradient(90deg, #059669, #10b981); }
  .nav-card.finance::before { background: linear-gradient(90deg, #f59e0b, #d97706); }
  .nav-card.stats::before { background: linear-gradient(90deg, #7c3aed, #8b5cf6); }

  .nav-icon {
    font-size: 28px;
    margin-bottom: 8px;
  }

  .nav-stat-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
    margin-bottom: 6px;
  }

  .nav-stat {
    font-size: 32px;
    font-weight: 900;
    color: #1a2a3a;
    line-height: 1;
  }

  .nav-stat-unit {
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
  }

  .nav-title {
    font-size: 20px;
    font-weight: 900;
    color: #1e293b;
    margin-bottom: 8px;
  }

  .nav-desc {
    font-size: 13px;
    color: #64748b;
    line-height: 1.6;
  }

  .nav-extra {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .nav-paid {
    display: inline-block;
    margin-top: 8px;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 20px;
    background: rgba(5, 150, 105, 0.1);
    color: #059669;
    border: 1px solid rgba(5, 150, 105, 0.25);
    letter-spacing: 0.5px;
  }

  .nav-next-game {
    margin-top: 10px;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 10px;
    background: rgba(37, 99, 235, 0.06);
    border: 1px solid rgba(37, 99, 235, 0.15);
    color: #2563eb;
    line-height: 1.5;
  }

  .nav-next-game .next-label {
    font-size: 10px;
    letter-spacing: 1px;
    color: #94a3b8;
    display: block;
    margin-bottom: 2px;
  }

  .nav-next-game .next-detail {
    font-size: 13px;
    color: #1e293b;
  }

  .nav-info-box {
    margin-top: 10px;
    width: 100%;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.6;
  }

  .nav-card.roster .nav-info-box {
    background: rgba(5, 150, 105, 0.06);
    border: 1px solid rgba(5, 150, 105, 0.15);
    color: #475569;
  }

  .nav-progress {
    margin-top: 6px;
    height: 6px;
    background: #e2e8f0;
    border-radius: 3px;
    overflow: hidden;
  }

  .nav-progress-bar {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #059669, #10b981);
  }

  .nav-progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-top: 4px;
    color: #64748b;
  }

  .nav-card.stats .nav-info-box {
    background: rgba(124, 58, 237, 0.06);
    border: 1px solid rgba(124, 58, 237, 0.15);
    color: #475569;
  }

  .nav-info-box .info-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }

  .nav-info-box .info-label {
    color: #94a3b8;
    font-size: 11px;
  }

  .nav-info-box .info-value {
    color: #1e293b;
    font-weight: 700;
    font-size: 12px;
  }

  .nav-arrow {
    margin-top: auto;
    padding-top: 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    transition: transform 0.2s ease;
  }

  .nav-card.schedule .nav-arrow { color: #2563eb; }
  .nav-card.roster .nav-arrow { color: #059669; }
  .nav-card.finance .nav-arrow { color: #d97706; }
  .nav-card.stats .nav-arrow { color: #7c3aed; }

  .nav-card:hover .nav-arrow {
    transform: translateX(4px);
  }

  /* 다음 경기 */
  .next-game {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 48px;
  }

  .next-game::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #dc2626, #f59e0b);
  }

  .next-game-label {
    font-size: 12px;
    font-weight: 700;
    color: #dc2626;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }

  .next-game-date {
    font-size: 28px;
    font-weight: 900;
    color: #1a2a3a;
    margin-bottom: 4px;
  }

  .next-game-info {
    font-size: 15px;
    color: #64748b;
    margin-bottom: 12px;
  }

  .next-game-vs {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    font-size: 22px;
    font-weight: 900;
    color: #1e293b;
  }

  .vs-badge {
    font-size: 13px;
    font-weight: 700;
    color: #94a3b8;
    padding: 2px 12px;
    background: #f1f5f9;
    border-radius: 8px;
  }

  .opening-tag {
    display: block;
    margin-top: 14px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 700;
    color: #dc2626;
    background: rgba(220, 38, 38, 0.08);
    border: 1px solid rgba(220, 38, 38, 0.2);
    border-radius: 20px;
    animation: pulse-glow 2s ease-in-out infinite;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 4px rgba(220, 38, 38, 0.15); }
    50% { box-shadow: 0 0 12px rgba(220, 38, 38, 0.3); }
  }

  /* 푸터 */
  .footer {
    text-align: center;
    padding-top: 24px;
    border-top: 1px solid #e2e8f0;
    color: #94a3b8;
    font-size: 12px;
  }

  /* 반응형 */
  @media (max-width: 640px) {
    .hero h1 { font-size: 30px; }
    .quick-stats { grid-template-columns: repeat(2, 1fr); }
    .nav-grid { grid-template-columns: repeat(2, 1fr); }
    .nav-card { padding: 28px 20px; }
    .next-game-date { font-size: 22px; }
    .next-game-vs { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="hero">
    <h1>풀베이스</h1>
    <div class="tagline">Full Base Baseball Club</div>
    <div class="season-badge">2026 SEASON</div>
  </div>

  <div class="nav-grid">
    <a href="schedule.html" class="nav-card schedule">
      <div class="nav-icon">📅</div>
      <div class="nav-title">시즌 일정</div>
      <div class="nav-stat-row">
        <div class="nav-stat">36</div>
        <div class="nav-stat-unit">경기</div>
      </div>
      <div id="next-game-info" class="nav-next-game"></div>
      <div class="nav-arrow">바로가기 →</div>
    </a>
    <a href="roster.html" class="nav-card roster">
      <div class="nav-icon">👥</div>
      <div class="nav-title">선수 명단</div>
      <div class="nav-stat-row">
        <div class="nav-stat">19</div>
        <div class="nav-stat-unit">명 참석</div>
      </div>
      <div class="nav-info-box">
        <div>💳 회비 납부 현황</div>
        <div class="nav-progress"><div class="nav-progress-bar" style="width:84.2%"></div></div>
        <div class="nav-progress-label"><span>16명 납부</span><span>3명 미납</span></div>
      </div>
      <div class="nav-arrow">바로가기 →</div>
    </a>
    <a href="finance.html" class="nav-card finance">
      <div class="nav-icon">💰</div>
      <div class="nav-title">회비 내역</div>
      <div class="nav-stat-row">
        <div class="nav-stat">678,400</div>
        <div class="nav-stat-unit">원</div>
      </div>
      <div class="nav-desc">현재 잔액</div>
      <div class="nav-paid">💳 납부 16/19명</div>
      <div class="nav-arrow">바로가기 →</div>
    </a>
    <a href="stats.html" class="nav-card stats">
      <div class="nav-icon">📊</div>
      <div class="nav-title">개인 기록</div>
      <div class="nav-stat-row">
        <div class="nav-stat">2</div>
        <div class="nav-stat-unit">시즌</div>
      </div>
      <div class="nav-info-box">
        <div class="info-row"><span class="info-label">2025 타격왕</span><span class="info-value">공민호 .534</span></div>
        <div class="info-row"><span class="info-label">2025 홈런왕</span><span class="info-value">고선옥 11HR</span></div>
        <div class="info-row"><span class="info-label">2025 다승왕</span><span class="info-value">고선옥 6승</span></div>
      </div>
      <div class="nav-arrow">바로가기 →</div>
    </a>
  </div>

  <div class="footer">
    ⚾ 풀베이스 2026 시즌 — 함께 뛰는 23명의 야구인
  </div>

</div>

<script>
(function() {
  const games = [
    {date:'2026-03-08',opp:'임팩트',type:'away',venue:'회룡중'},
    {date:'2026-03-15',opp:'DNA',type:'home',venue:'회룡중'},
    {date:'2026-03-29',opp:'서연베스트',type:'home',venue:'회룡중'},
    {date:'2026-04-05',opp:'도깨비',type:'home',venue:'회룡중'},
    {date:'2026-04-19',opp:'썸타임즈',type:'away',venue:'양원초'},
    {date:'2026-04-26',opp:'타이푼',type:'away',venue:'양원초'},
    {date:'2026-05-10',opp:'어셈블',type:'away',venue:'사우고'},
    {date:'2026-05-17',opp:'인터리그: 순위전',type:'special',venue:'미정'},
    {date:'2026-05-31',opp:'인터리그: 지명전',type:'special',venue:'미정'},
    {date:'2026-06-14',opp:'임팩트',type:'home',venue:'회룡중'},
    {date:'2026-06-21',opp:'DNA',type:'away',venue:'덕산고'},
    {date:'2026-07-05',opp:'서연베스트',type:'away',venue:'덕산고'},
    {date:'2026-07-12',opp:'도깨비',type:'away',venue:'사우고'},
    {date:'2026-08-30',opp:'썸타임즈',type:'home',venue:'회룡중'},
    {date:'2026-09-06',opp:'타이푼',type:'home',venue:'회룡중'},
    {date:'2026-09-13',opp:'어셈블',type:'home',venue:'회룡중'}
  ];
  const today = new Date(); today.setHours(0,0,0,0);
  const next = games.find(g => new Date(g.date) >= today);
  const el = document.getElementById('next-game-info');
  if (next && el) {
    const d = new Date(next.date);
    const m = d.getMonth()+1, day = d.getDate();
    el.innerHTML = '<span class="next-label">NEXT GAME</span><span class="next-detail">'+m+'/'+day+' vs '+next.opp+'<br>📍 '+next.venue+'</span>';
  }
})();
</script>

</body>
</html>
